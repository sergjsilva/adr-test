<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADR Test - Preparatorio CAP - Galicia</title>

    <!--Bootstrap Link-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="main">
      <div class="header mt-0">
        <nav class="navbar navbar-expand-md bg-dark navbar-dark fixed-top">
          <div class="container">
            <a href="#home" class="navbar-brand"
              ><img src="./images/mascot.png" alt="brand icon" />ADR Test</a
            >
            <!-- The options of the hamburger menu-->
            <!--collapse instead of dropdown-->
            <button
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav"
              class="navbar-toggler"
            >
              <!-- This line give us the hamburger-->
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                  <a href="#home" class="nav-link active">Home</a>
                </li>
                <li class="nav-item">
                  <a href="#test" class="nav-link">Iniciar Test</a>
                </li>
                <li class="nav-item">
                  <a href="#about" class="nav-link">Acerca de</a>
                </li>
                <li class="nav-item">
                  <a href="#contact" class="nav-link">Contacto</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
      <div class="sections-container">
        <!--Quiz Section -->
        <section class="quiz-section bg-white text-dark">
          <div class="quiz-box p-2">
            <h1 class="text-center text-white fw-bolder rounded-3">Test ADR</h1>
            <div class="quiz-header p-2 border-bottom border-2">
              <span class="question-total text-secondary"
                >1 de 5 Preguntas</span
              >
              <span
                class="header-score text-white bg-success p-2 rounded-3 fw-bold"
                >Score: 0/5</span
              >
            </div>
            <p class="question-text fs-5 mt-2">
              <!--Question text here-->
            </p>
            <div class="option-container">
              <!--Question options here-->
            </div>
            <div class="quiz-footer border-top border-2 mt-3 pt-2">
              <button class="next-btn btn btn-primary disabled">Próxima</button>
            </div>
          </div>
        </section>
        <!-- Inicial Homepage section-->
        <section class="home">
          <div
            class="home-content bg-secondary bg-gradient text-white"
            style="--bs-bg-opacity: 0.85"
          >
            <h1>Quiz App.</h1>
            <p>
              En esta página encontrarás un quiz sobre
              <em>ADR - mercancías peligrosas</em>. Presiona el botón de abajo
              para elegir el número de preguntas y comenzar el test.
            </p>
            <button
              class="start-btn btn btn-primary"
              type="button"
              data-bs-toggle="modal"
              data-bs-target="#myModal"
            >
              Iniciar Test
            </button>
          </div>
        </section>
      </div>
    </main>

    <!--Modal Box -->
    <div class="modal fade" id="myModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-secondary bg-opacity-75 text-light">
            <h1 class="modal-title fs-5" id="myModalLabel">Quiz App</h1>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <!-- Input Group-->
            <div class="input-group mb-3">
              <div class="input-group-prepend">
                <label class="input-group-text" for="inputGroupSelect">
                  ¿Cuántas preguntas en tu test?</label
                >
              </div>
              <select class="custom-select" id="inputGroupSelect">
                <option selected>Selecione ...</option>
                <option value="5">5 preguntas</option>
                <option value="10">10 preguntas</option>
                <option value="15">15 preguntas</option>
                <option value="20">20 preguntas</option>
                <option value="25">25 preguntas</option>
                <option value="30">30 preguntas</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <div class="footer-btn-group">
              <button
                class="btn btn-secondary custom-button-size"
                data-bs-dismiss="modal"
                name="exit"
              >
                Salir
              </button>
              <button
                class="btn btn-primary custom-button-size"
                data-bs-dismiss="modal"
                name="continue"
              >
                Continuar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!--Bootstrap Javascript-->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./js/main.js" type="module"></script>
  </body>
</html>
